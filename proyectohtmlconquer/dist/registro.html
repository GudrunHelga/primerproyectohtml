<!doctype html>
<html lang="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="css/style.css" />
    <meta name="description" content="" />

    <meta property="og:title" content="" />
    <meta property="og:type" content="" />
    <meta property="og:url" content="" />
    <meta property="og:image" content="" />
    <meta property="og:image:alt" content="" />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.png" />

    <link rel="manifest" href="site.webmanifest" />
    <meta name="theme-color" content="#fafafa" />
  </head>

  <body>
    <header>
      <img
        src="img/Conquer-Blocks-logo.avif"
        alt="Logo web"
        width="150"
        height="80"
        loading="lazy"
      />
      <h1>Conquer English Academy</h1>
      <h3>This is where you don't only learn a language but enjoy it.</h3>
      <p><a href="index.html">Homepage</a></p>
      <hr />
    </header>

    <main>
      <!-- Primera sección -->
      <section>
        <h2>New register</h2>
        <hr />

        <form action="" method="get">
          <p>
            <label for="name">Name:</label>
            <input type="text" id="name" maxlength="30" />
            <label for="last_name">Last name:</label>
            <input type="text" id="last_name" maxlength="50" />
          </p>

          <p>
            <label for="date">Birthday:</label>
            <input type="date" id="date" maxlength="50" />
          </p>

          <p>
            <label for="email"> Email</label>
            <input type="email" id="email" />
          </p>

          <p>
            <label for="address">Address:</label>
            <input type="text" id="address" maxlength="70" />
          </p>

          <p>
            <label for="webpage">Webpage:</label>
            <input type="text" id="webpage" maxlength="70" />
          </p>

          <p>
            <label for="photo">Picture:</label>
            <input type="file" id="photo" />
          </p>

          <p>
            <label for="bio">Biography:</label> <br />
            <textarea
              name="bio"
              id="bio"
              rows="5"
              cols="30"
              placeholder="Write your text here:"
            ></textarea>
          </p>

          <button>Enviar</button>
        </form>
      </section>
    </main>

    <footer>Copyright © 2026 By ConquerX</footer>
  </body>
</html>
